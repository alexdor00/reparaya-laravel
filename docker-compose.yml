services:
  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./producto3:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: reparaya
      MYSQL_USER: reparaya_user
      MYSQL_PASSWORD: reparaya_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root

  composer:
    image: composer:latest
    volumes:
      - ./:/app
    working_dir: /app/producto3
    entrypoint: composer

volumes:
  db_data: